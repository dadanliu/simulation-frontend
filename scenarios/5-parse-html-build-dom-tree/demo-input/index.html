<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>DOM Tree Demo</title>
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <main class="page-shell" id="root">
      <h1>Hello DOM</h1>
      <p>浏览器会把这段 HTML 字节流解析成一棵 <em>DOM</em> 树。</p>
      <img src="/images/logo.svg" alt="logo" />
      <button class="primary" data-kind="cta">Click <span>Me</span></button>
      <!-- 注释节点也会进树 -->
    </main>
    <script src="/js/app.js"></script>
  </body>
</html>
