name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-projects:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - full-chain
          - scenarios/browser-receives-server-component-result
          - scenarios/build-emits-static-html
          - scenarios/build-emits-runtime-artifacts
          - scenarios/request-generates-html-on-server
          - scenarios/hydration-enables-interaction
          - scenarios/client-state-drives-ui-update
          - scenarios/fetch-roundtrip-updates-ui
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ matrix.project }}/pnpm-lock.yaml
        continue-on-error: true

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build
