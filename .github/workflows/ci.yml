name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-projects:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - full-chain
          - scenarios/stage0-rsc-basic
          - scenarios/stage1-ssg-basic
          - scenarios/stage2-build-artifacts
          - scenarios/stage3-ssr-basic
          - scenarios/stage4-hydration-basic
          - scenarios/stage5-csr-basic
          - scenarios/stage6-api-roundtrip
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ matrix.project }}/pnpm-lock.yaml
        continue-on-error: true

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build
